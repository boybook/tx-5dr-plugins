name: Market CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate-layout:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: List root plugin directories
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t plugin_dirs < <(find . -mindepth 1 -maxdepth 1 -type d \
            ! -name '.git' \
            ! -name '.github' \
            | sort)

          echo "Detected plugin directories:"
          if [ "${#plugin_dirs[@]}" -eq 0 ]; then
            echo "(none yet)"
            exit 0
          fi

          printf '%s\n' "${plugin_dirs[@]}"

      - name: Placeholder
        run: |
          echo "Next step: add plugin validation, packaging, catalog generation, and OSS upload."
